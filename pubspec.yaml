name: task_manager
description: Personal task and time management application
publish_to: 'none'
version: 0.2.5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3
  intl: ^0.20.2
  uuid: ^4.2.2
  supabase_flutter: ^2.0.0
  connectivity_plus: ^5.0.0
  shared_preferences: ^2.2.0
  table_calendar: ^3.1.0
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  drift_dev: ^2.14.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true