name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
            upload-artifact: app-release.apk
            upload-path: build/app/outputs/flutter-apk/app-release.apk

          - target: windows
            os: windows-latest
            upload-artifact: task_manager-windows.zip
            upload-path: build/windows/x64/runner/Release/task_manager-windows.zip

          - target: macos
            os: macos-latest
            upload-artifact: task_manager-macos.zip
            upload-path: build/macos/Build/Products/Release/task_manager-macos.zip

          - target: linux
            os: ubuntu-latest
            upload-artifact: task_manager-linux.zip
            upload-path: build/linux/x64/release/bundle/task_manager-linux.zip

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Enable Linux desktop
        if: matrix.target == 'linux'
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android
        if: matrix.target == 'android'
        run: flutter build apk --release

      - name: Build Windows
        if: matrix.target == 'windows'
        shell: powershell
        run: |
          flutter build windows --release
          cd build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath task_manager-windows.zip

      - name: Build macOS
        if: matrix.target == 'macos'
        run: |
          flutter build macos --release
          cd build/macos/Build/Products/Release
          zip -r task_manager-macos.zip task_manager.app

      - name: Build Linux
        if: matrix.target == 'linux'
        run: |
          flutter build linux --release
          cd build/linux/x64/release/bundle
          zip -r task_manager-linux.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.upload-artifact }}
          path: ${{ matrix.upload-path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Rename assets
        run: |
          VER="v${{ steps.version.outputs.VERSION }}"
          mv app-release.apk "TaskManager_${VER}_Android.apk" 2>/dev/null || true
          mv app-release.apk/app-release.apk "TaskManager_${VER}_Android.apk" 2>/dev/null || true
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TaskManager v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          body: |
            # TaskManager v${{ steps.version.outputs.VERSION }}

            Personal task and time management application.

            ## Downloads
            | Platform | File |
            |----------|------|
            | Android | TaskManager_${{ github.ref_name }}_Android.apk |
            | Windows | task_manager-windows.zip |
            | macOS | task_manager-macos.zip |
            | Linux | task_manager-linux.zip |

            ## Features
            - Cross-platform sync via Supabase
            - Time tracking with manual entry and timer
            - Project management with drag-and-drop
            - Calendar with mood tracking
            - Journal / quick notes
            - Special days tracker with 12-month grid
            - Dashboard with statistics
            - Gantt chart with zoom levels
            - Auto-update checker
          files: |
            app-release.apk
            task_manager-windows.zip
            task_manager-macos.zip
            task_manager-linux.zip
