name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
            artifact-source: build/app/outputs/flutter-apk/app-release.apk

          - target: windows
            os: windows-latest
            artifact-source: build/windows/x64/runner/Release/TaskManager_windows.zip

          - target: macos
            os: macos-latest
            artifact-source: build/macos/Build/Products/Release/task_manager-macos.zip

          - target: linux
            os: ubuntu-latest
            artifact-source: build/linux/x64/release/bundle/TaskManager

    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ github.ref_name }}
      APP_NAME: TaskManager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=https://ozbxlqffizhllybonfpu.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96YnhscWZmaXpobGx5Ym9uZnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTM2MTUsImV4cCI6MjA5MzI4OTYxNX0.pGWSJo-GMI_U8DYk9D0rw7PcgFYFR8aXMR_rYCJnt1M" >> .env

      - name: Prepare Android signing
        if: matrix.target == 'android'
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/task-manager-release.keystore

      - name: Build Android
        if: matrix.target == 'android'
        run: |
          flutter build apk --release --dart-define=APP_VERSION=${VERSION#v}

      - name: Build Windows
        if: matrix.target == 'windows'
        shell: powershell
        run: |
          flutter build windows --release
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ${APP_NAME}_${VERSION}_windows.zip

      - name: Build macOS
        if: matrix.target == 'macos'
        run: |
          flutter build macos --release
          cd build/macos/Build/Products/Release
          zip -r ${APP_NAME}_${VERSION}_macos.zip task_manager.app

      - name: Build Linux
        if: matrix.target == 'linux'
        run: |
          flutter build linux --release

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.target }}" == "linux" ]; then
            tar -czf artifacts/${APP_NAME}_${VERSION}_linux.tar.gz -C build/linux/x64/release/bundle .
          elif [ "${{ matrix.target }}" != "windows" ] && [ "${{ matrix.target }}" != "macos" ]; then
            cp "${{ matrix.artifact-source }}" "artifacts/${APP_NAME}_${VERSION}_${{ matrix.target }}.apk"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifact
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build

      - name: List artifacts
        run: find build -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TaskManager ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: build/**/*
          body: |
            # TaskManager ${{ github.ref_name }}

            Personal task and time management application.
