name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
            upload-artifact: app-release.apk
            upload-path: build/app/outputs/flutter-apk/app-release.apk

          - target: windows
            os: windows-latest
            upload-artifact: task_manager-windows.zip
            upload-path: build/windows/x64/runner/Release/task_manager-windows.zip

          - target: macos
            os: macos-latest
            upload-artifact: task_manager-macos.zip
            upload-path: build/macos/Build/Products/Release/task_manager-macos.zip

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=https://ozbxlqffizhllybonfpu.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96YnhscWZmaXpobGx5Ym9uZnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTM2MTUsImV4cCI6MjA5MzI4OTYxNX0.pGWSJo-GMI_U8DYk9D0rw7PcgFYFR8aXMR_rYCJnt1M" >> .env

      - name: Build Android
        if: matrix.target == 'android'
        run: flutter build apk --release

      - name: Build Windows
        if: matrix.target == 'windows'
        shell: powershell
        run: |
          flutter build windows --release
          cd build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath task_manager-windows.zip

      - name: Build macOS
        if: matrix.target == 'macos'
        run: |
          flutter build macos --release
          cd build/macos/Build/Products/Release
          zip -r task_manager-macos.zip task_manager.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.upload-artifact }}
          path: ${{ matrix.upload-path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TaskManager v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          body: |
            # TaskManager v${{ steps.version.outputs.VERSION }}

            Personal task and time management application.
            ## Downloads
            | Platform | File |
            |----------|------|
            | Android | app-release.apk |
            | Windows | task_manager-windows.zip |
            | macOS | task_manager-macos.zip |
          files: |
            app-release.apk*
            task_manager-windows.zip*
            task_manager-macos.zip*
