name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
            extension: apk
            upload-path: build/app/outputs/flutter-apk/app-release.apk

          - target: windows
            os: windows-latest
            extension: zip
            upload-path: build/windows/x64/runner/Release/task_manager-windows.zip

          - target: macos
            os: macos-latest
            extension: zip
            upload-path: build/macos/Build/Products/Release/task_manager-macos.zip

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Get version
        id: version
        run: echo "VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=https://ozbxlqffizhllybonfpu.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96YnhscWZmaXpobGx5Ym9uZnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTM2MTUsImV4cCI6MjA5MzI4OTYxNX0.pGWSJo-GMI_U8DYk9D0rw7PcgFYFR8aXMR_rYCJnt1M" >> .env

      - name: Prepare Android signing
        if: matrix.target == 'android'
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/task-manager-release.keystore

      - name: Build Android
        if: matrix.target == 'android'
        run: flutter build apk --release

      - name: Build Windows
        if: matrix.target == 'windows'
        shell: powershell
        run: |
          flutter build windows --release
          cd build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath TaskManager_${{ steps.version.outputs.VERSION }}_windows.zip

      - name: Build macOS
        if: matrix.target == 'macos'
        run: |
          flutter build macos --release
          cd build/macos/Build/Products/Release
          zip -r TaskManager_${{ steps.version.outputs.VERSION }}_macos.zip task_manager.app

      - name: Upload Android artifact
        if: matrix.target == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Windows artifact
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows/x64/runner/Release/TaskManager_windows.zip

      - name: Upload macOS artifact
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/macos/Build/Products/Release/TaskManager_macos.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build

      - name: List artifacts
        run: |
          find build -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TaskManager ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            # TaskManager ${{ github.ref_name }}

            Personal task and time management application.
          files: |
            build/android/app-release.apk
            build/windows/TaskManager_windows.zip
            build/macos/TaskManager_macos.zip